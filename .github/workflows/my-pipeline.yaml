name: GitHub Pipeline

on:
  push:
    branches:
      - main
  
jobs:
  build:
    name: my-spc
    runs-on: self-hosted
    steps:
      - name: git checkout
        uses: actions/checkout@v2

      - name: build java maven
        run: mvn package 

      - name: sonar scan
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=Mygit-personal_spring-petclinic \
          -Dsonar.organization=mygit-personal \
          -Dsonar.host.url=https://sonarcloud.io \ 
          _dsonar.login=${{secrets.SONAR_TOKEN}}

      