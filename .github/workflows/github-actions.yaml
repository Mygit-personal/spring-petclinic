name: GitHub Actions

on: 
  push: 
    branches: 
      - main

jobs: 
  build:
      name: my-spc
      runs-on: self-hosted
      steps:
        - name: git checkout
          uses: actions/checkout@v4

        - name: Build java with maven
          run: mvn package

        - name: build 
          run: mvn clean verify  

        - name: sonar scan 
          run: | 
            mvn package sonar:sonar \
            -Dsonar.projectKey=Mygit-personal_spring-petclinic \
            -Dsonar.organization=mygit-personal-spc \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login =${{ secrets.SONAR_TOKEN }}