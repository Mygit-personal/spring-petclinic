name: GitHub Actions

on: 
  push: 
    branches: 
      - main

jobs: 
  build:
      name: my-spc
      runs-on: self-hosted
      steps:
        - name: git checkout
          uses: actions/checkout@v4
        - name: Build java with maven
          run: mvn package

        - name: build 
          run: mvn clean verify  
        - name: sonar scan 
          uses: SonarSource/sonarqube-scan-action@v7
          env:
            SONAR_TOKEN = ${{ secrets.SONAR_TOKEN }} 

        